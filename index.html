<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* MP4 Video Background */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* Card */
.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.85);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 320px;
    position: relative;
    z-index: 2;
}

/* Name wrapper */
.name-wrapper {
    position: relative;
    display: inline-block;
}

/* Name */
.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff0000, 0 0 25px #ff0000;
    margin: 0;
}

/* Particles - Floating freely around @nuf */
#particles {
    position: absolute;
    top: -80px;
    left: -80px;
    width: calc(100% + 160px);
    height: calc(100% + 160px);
    pointer-events: none;
    z-index: 1;
}
</style>
</head>

<body>

<!-- MP4 Video Background - Plays automatically -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="Replay 2026-04-13 03-39-55 - Trim.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<div class="overlay"></div>

<div class="container">
    
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p>EVERYTHING NUF</p>

    <div class="links">
        <a href="https://x.com/nufings">TWITTER</a>
        <a href="https://www.youtube.com/@nufns">YouTube</a>
        <a href="https://www.tiktok.com/@nufns">TIKTOK</a>
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createParticle() {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.8 + 1.3,
        speedX: (Math.random() - 0.5) * 2.2,
        speedY: (Math.random() - 0.5) * 2.2,
        life: 80 + Math.random() * 50
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (particles.length < 55) {
        createParticle();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        const alpha = Math.max(p.life / 90, 0.18);

        // Bright Pink Particles
        ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
