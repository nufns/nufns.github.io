<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Video Background */
#bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark Overlay */
.overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* Main Transparent Card */
.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.68);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 340px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 0.2s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
}

.glow-name {
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4, 0 0 28px #ff69b4;
    margin: 0;
}

.subtitle {
    font-size: 16px;
    color: #ff69b4;
    text-shadow: 0 0 8px #ff69b4, 0 0 18px #ff69b4;
    margin: 18px 0 25px;
    letter-spacing: 1px;
    font-weight: bold;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.links a {
    display: block;
    padding: 14px 20px;
    border-radius: 10px;
    background: rgba(26, 26, 26, 0.9);
    text-decoration: none;
    color: white;
    font-size: 15px;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.links a:hover {
    background: rgba(37, 37, 37, 0.95);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
    border-color: rgba(255, 105, 180, 0.3);
}

/* View Counter - Top Right Corner */
.view-counter {
    position: fixed;
    top: 20px;
    right: 25px;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(17, 17, 17, 0.85);
    padding: 8px 16px;
    border-radius: 30px;
    box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
    border: 1px solid rgba(255, 105, 180, 0.3);
    pointer-events: none;
}

.eye-icon {
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4;
}

.view-count {
    font-size: 20px;
    font-weight: bold;
    color: #ff69b4;
    min-width: 35px;
    text-align: center;
}
</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
    <source src="Replay 2026-04-13 03-39-55 - Trim.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
