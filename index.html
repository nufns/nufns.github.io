<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -2;
}

.overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.68);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 340px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 0.2s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
}

.glow-name {
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4, 0 0 28px #ff69b4;
    margin: 0;
}

.subtitle {
    font-size: 16px;
    color: #ff69b4;
    text-shadow: 0 0 8px #ff69b4, 0 0 18px #ff69b4;
    margin: 18px 0 25px;
    letter-spacing: 1px;
    font-weight: bold;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.links a {
    display: block;
    padding: 14px 20px;
    border-radius: 10px;
    background: rgba(26, 26, 26, 0.9);
    text-decoration: none;
    color: white;
    font-size: 15px;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.links a:hover {
    background: rgba(37, 37, 37, 0.95);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
    border-color: rgba(255, 105, 180, 0.3);
}

/* View Counter - Eyeball Icon (slightly above middle) */
.view-counter {
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: rgba(17, 17, 17, 0.75);
    padding: 10px 18px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
    border: 1px solid rgba(255, 105, 180, 0.25);
    pointer-events: none; /* so it doesn't block clicks */
}

.eye-icon {
    font-size: 26px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4;
}

.view-count {
    font-size: 18px;
    font-weight: bold;
    color: #ff69b4;
    min-width: 30px;
    text-align: center;
}

/* Music Controls (kept from before) */
.music-controls {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 100;
    background: rgba(17, 17, 17, 0.92);
    padding: 18px 16px;
    border-radius: 22px;
    box-shadow: 0 0 40px rgba(255, 105, 180, 0.45);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

#play-btn {
    background: #ff69b4;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
}

#play-btn:hover {
    background: #ff8ac4;
    transform: scale(1.08);
}

#volume-icon {
    font-size: 30px;
    color: #ff69b4;
    cursor: pointer;
    transition: transform 0.25s;
}

#volume-icon:hover { transform: scale(1.25); }

#volume-slider {
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    height: 120px;
    width: 8px;
    accent-color: #ff69b4;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    cursor: pointer;
}

#music-status {
    font-size: 13px;
    color: #ff69b4;
    margin-top: 6px;
}
</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
    <source src="Replay 2026-04-13 03-39-55 - Trim.mp4" type="video/mp4">
</video>

<audio id="bg-music" loop>
    <source src="Leray - Trippie Redd INSTRUMENTAL (A Love Letter To You 4).mp3" type="audio/mpeg">
</audio>

<div class="overlay"></div>

<div class="container">
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p class="subtitle">ALL SOCIALS BELOW</p>

    <div class="links" id="social-links">
        <a href="https://x.com/nufings" target="_blank">TWITTER</a>
        <a href="https://www.youtube.com/@nufns" target="_blank">YOUTUBE</a>
        <a href="https://www.tiktok.com/@nufns" target="_blank">TIKTOK</a>
        <a href="https://www.twitch.tv/nuf" target="_blank">TWITCH</a>
        <a href="https://kick.com/nuf" target="_blank">KICK</a>
        <a href="https://steamcommunity.com/id/yoursteamid" target="_blank">STEAM</a>
    </div>
</div>

<!-- Eyeball View Counter -->
<div class="view-counter">
    <span class="eye-icon">👁</span>
    <span class="view-count" id="view-count">0</span>
</div>

<!-- Music Controls -->
<div class="music-controls">
    <button id="play-btn">▶ PLAY MUSIC</button>
    <div id="volume-icon">🔊</div>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.75">
    <div id="music-status">Click PLAY to start</div>
</div>

<script>
// Particles code (same as before)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];
let canSpawnParticles = false;

function createParticle() {
    const centerX = canvas.width * 0.5;
    const centerY = canvas.height * 0.5;
    const spread = 65;
    particles.push({
        x: centerX + (Math.random() - 0.5) * spread * 2,
        y: centerY + (Math.random() - 0.5) * spread * 1.6,
        size: Math.random() * 2.6 + 1.1,
        speedX: (Math.random() - 0.5) * 0.9,
        speedY: (Math.random() - 0.5) * 0.9,
        life: 95 + Math.random() * 45
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (canSpawnParticles && particles.length < 40) createParticle();

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;
        const alpha = Math.max(p.life / 110, 0.16);
        ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    }
    requestAnimationFrame(animate);
}
animate();
setTimeout(() => { canSpawnParticles = true; }, 2000);

// ==================== VIEW COUNTER ====================
const viewCountEl = document.getElementById('view-count');
let viewCount = parseInt(localStorage.getItem('nufViewCount')) || 0;
viewCountEl.textContent = viewCount;

// Add click listener to all social links
const links = document.querySelectorAll('#social-links a');
links.forEach(link => {
    link.addEventListener('click', () => {
        viewCount++;
        viewCountEl.textContent = viewCount;
        localStorage.setItem('nufViewCount', viewCount);
    });
});

// ==================== MUSIC CONTROLS (unchanged) ====================
const audio = document.getElementById('bg-music');
const playBtn = document.getElementById('play-btn');
const slider = document.getElementById('volume-slider');
const volumeIcon = document.getElementById('volume-icon');
const statusText = document.getElementById('music-status');

let isPlaying = false;
audio.volume = 0.75;
slider.value = 0.75;

playBtn.addEventListener('click', () => {
    if (!isPlaying) {
        audio.play().then(() => {
            isPlaying = true;
            playBtn.textContent = '❚❚ PAUSE MUSIC';
            statusText.textContent = '♪ Now Playing';
        }).catch(() => {
            statusText.textContent = 'Error - Try again';
        });
    } else {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = '▶ PLAY MUSIC';
        statusText.textContent = 'Music Paused';
    }
});

slider.addEventListener('input', () => {
    audio.volume = parseFloat(slider.value);
});

volumeIcon.addEventListener('click', () => {
    audio.muted = !audio.muted;
    volumeIcon.textContent = audio.muted ? '🔇' : '🔊';
});
</script>

</body>
</html>
