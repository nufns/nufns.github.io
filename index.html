<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* MP4 Video Background */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* Card with fade-in */
.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.68);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 340px;
    position: relative;
    z-index: 2;
    
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 0.2s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* Name */
.name-wrapper {
    position: relative;
    display: inline-block;
}

.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4, 0 0 28px #ff69b4;
    margin: 0;
}

/* Subtitle */
.subtitle {
    font-size: 16px;
    color: #ff69b4;
    text-shadow: 0 0 8px #ff69b4, 0 0 18px #ff69b4;
    margin: 18px 0 25px;
    letter-spacing: 1px;
    font-weight: bold;
}

/* Particles */
#particles {
    position: absolute;
    top: -55px;
    left: -55px;
    width: calc(100% + 110px);
    height: calc(100% + 110px);
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: particlesFadeIn 0.8s ease forwards;
    animation-delay: 1.9s;
}

@keyframes particlesFadeIn {
    to { opacity: 1; }
}

/* Links */
.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.links a {
    display: block;
    padding: 14px 20px
