<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* MP4 Video Background */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* Card with fade-in */
.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.68);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 340px;
    position: relative;
    z-index: 2;
    
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 0.2s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* Name */
.name-wrapper {
    position: relative;
    display: inline-block;
}

.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4, 0 0 28px #ff69b4;
    margin: 0;
}

/* Subtitle */
.subtitle {
    font-size: 16px;
    color: #ff69b4;
    text-shadow: 0 0 8px #ff69b4, 0 0 18px #ff69b4;
    margin: 18px 0 25px;
    letter-spacing: 1px;
    font-weight: bold;
}

/* Particles - delayed start */
#particles {
    position: absolute;
    top: -55px;
    left: -55px;
    width: calc(100% + 110px);
    height: calc(100% + 110px);
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: particlesFadeIn 0.8s ease forwards;
    animation-delay: 1.9s;
}

@keyframes particlesFadeIn {
    to { opacity: 1; }
}

/* Slick link boxes - FIXED */
.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.links a {
    display: block;
    padding: 14px 20px;
    border-radius: 10px;
    background: rgba(26, 26, 26, 0.9);
    text-decoration: none;
    color: white;
    font-size: 15px;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.links a:hover {
    background: rgba(37, 37, 37, 0.95);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
    border-color: rgba(255, 105, 180, 0.3);
}

/* ==================== NEW: MUSIC CONTROLS ==================== */
.music-controls {
    position: fixed;
    bottom: 35px;
    right: 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(17, 17, 17, 0.88);
    padding: 14px 12px;
    border-radius: 22px;
    box-shadow: 0 0 35px rgba(255, 105, 180, 0.35);
    border: 1px solid rgba(255,255,255,0.12);
}

#volume-icon {
    font-size: 26px;
    color: #ff69b4;
    text-shadow: 0 0 14px #ff69b4, 0 0 22px #ff69b4;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.25s ease;
}

#volume-icon:hover {
    transform: scale(1.15);
    text-shadow: 0 0 18px #ff69b4;
}

#volume-slider {
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    height: 135px;
    width: 7px;
    accent-color: #ff69b4;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    outline: none;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
}

#volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #ff69b4;
    border-radius: 50%;
    box-shadow: 0 0 12px #ff69b4, 0 0 22px #ff69b4;
    cursor: pointer;
}

#volume-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: #ff69b4;
    border-radius: 50%;
    box-shadow: 0 0 12px #ff69b4, 0 0 22px #ff69b4;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- MP4 Video Background -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="Replay 2026-04-13 03-39-55 - Trim.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<!-- BACKGROUND MUSIC (autoplay + loop) -->
<!-- REPLACE "background-music.mp3" WITH YOUR OWN MUSIC FILE PATH/URL -->
<audio id="bg-music" autoplay loop>
    <source src="Leray - Trippie Redd INSTRUMENTAL  (A Love Letter To You 4).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<div class="overlay"></div>

<div class="container">
    
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p class="subtitle">ALL SOCIALS BELOW</p>

    <div class="links">
        <a href="https://x.com/nufings" target="_blank">TWITTER</a>
        <a href="https://www.youtube.com/@nufns" target="_blank">YOUTUBE</a>
        <a href="https://www.tiktok.com/@nufns" target="_blank">TIKTOK</a>
        <a href="https://www.twitch.tv/nufns" target="_blank">TWITCH</a>
        <a href="https://kick.com/nufns" target="_blank">KICK</a>
        <a href="https://steamcommunity.com/id/nufns" target="_blank">STEAM</a>
    </div>

</div>

<!-- NEW: Vertical volume slider in bottom right -->
<div class="music-controls">
    <div id="volume-icon">🔊</div>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];
let canSpawnParticles = false;

function createParticle() {
    const centerX = canvas.width * 0.5;
    const centerY = canvas.height * 0.5;
    const spread = 65;

    particles.push({
        x: centerX + (Math.random() - 0.5) * spread * 2,
        y: centerY + (Math.random() - 0.5) * spread * 1.6,
        size: Math.random() * 2.6 + 1.1,
        speedX: (Math.random() - 0.5) * 0.9,
        speedY: (Math.random() - 0.5) * 0.9,
        life: 95 + Math.random() * 45
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Only spawn particles after fade-in is complete
    if (canSpawnParticles && particles.length < 40) {
        createParticle();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        const alpha = Math.max(p.life / 110, 0.16);

        ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(animate);
}

animate();

// Start spawning particles after the card + particles canvas have faded in
setTimeout(() => {
    canSpawnParticles = true;
}, 1000);   // 2 seconds total delay

/* ==================== NEW: BACKGROUND MUSIC CONTROLS ==================== */
const audio = document.getElementById('bg-music');
const slider = document.getElementById('volume-slider');
const volumeIcon = document.getElementById('volume-icon');
let isMuted = false;

// Initial volume (you can change this default)
audio.volume = 0.5;
slider.value = 0.5;

// Volume slider
slider.addEventListener('input', () => {
    audio.volume = parseFloat(slider.value);
    
    // If user was muted and moves the slider, unmute automatically
    if (audio.muted) {
        audio.muted = false;
        isMuted = false;
        volumeIcon.textContent = '🔊';
    }
});

// Click speaker icon to mute / unmute
volumeIcon.addEventListener('click', () => {
    isMuted = !isMuted;
    audio.muted = isMuted;
    volumeIcon.textContent = isMuted ? '🔇' : '🔊';
});

// Optional: If the browser blocks autoplay, the user can still adjust the slider
// and the music will play once they interact with the page
</script>

</body>
</html>
