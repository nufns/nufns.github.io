<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    text-align: center;
    background: #111;
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    width: 320px;
}

/* Name wrapper */
.name-wrapper {
    position: relative;
    display: inline-block;
}

/* Name */
.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff0000, 0 0 25px #ff0000;
    margin: 0;
}

/* Canvas locked exactly to text */
#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p>EVERYTHING NUF</p>

    <div class="links">
        <a href="#">Discord</a>
        <a href="https://www.youtube.com/@nufns">YouTube</a>
        <a href="#">GitHub</a>
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createParticle() {
    // Create particles only within the text bounds (slightly padded)
    const padding = 8;
    
    particles.push({
        x: Math.random() * (canvas.width - padding * 2) + padding,
        y: Math.random() * (canvas.height - padding * 2) + padding,
        size: Math.random() * 1.2 + 0.6,   // Much smaller particles
        speedX: (Math.random() - 0.5) * 1.2,
        speedY: (Math.random() - 0.5) * 1.2,
        life: 45 + Math.random() * 30      // Slightly shorter life
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Create new particles more frequently but keep total low
    if (particles.length < 25) {
        createParticle();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        // Fade out as life decreases
        const alpha = p.life / 60;

        ctx.fillStyle = `rgba(255, 40, 40, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
