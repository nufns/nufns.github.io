<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* MP4 Video Background */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* Card - slightly transparent for sleek glass look */
.container {
    text-align: center;
    background: rgba(17, 17, 17, 0.68);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    width: 340px; /* slightly wider for 6 links */
    position: relative;
    z-index: 2;
}

/* Name wrapper */
.name-wrapper {
    position: relative;
    display: inline-block;
}

/* @nuf - now pink to match particles */
.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff69b4;
    text-shadow: 0 0 12px #ff69b4, 0 0 28px #ff69b4;
    margin: 0;
}

/* Particles - confined tightly around @nuf only */
#particles {
    position: absolute;
    top: -55px;
    left: -55px;
    width: calc(100% + 110px);
    height: calc(100% + 110px);
    pointer-events: none;
    z-index: 1;
}

/* Slick link boxes */
.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.links a {
    display: block;
    padding: 14px 20px;
    border-radius: 10px;
    background: rgba(26, 26, 26, 0.9);
    text-decoration: none;
    color: white;
    font-size: 15px;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.links a:hover {
    background: rgba(37, 37, 37, 0.95);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
    border-color: rgba(255, 105, 180, 0.3);
}
</style>
</head>

<body>

<!-- MP4 Video Background -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="Replay 2026-04-13 03-39-55 - Trim.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<div class="overlay"></div>

<div class="container">
    
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p>EVERYTHING NUF</p>

    <!-- Slick Text Boxes (now with Twitch, Kick, and Steam) -->
    <div class="links">
        <a href="https://x.com/nufings" target="_blank">TWITTER</a>
        <a href="https://www.youtube.com/@nufns" target="_blank">YOUTUBE</a>
        <a href="https://www.tiktok.com/@nufns" target="_blank">TIKTOK</a>
        <a href="https://www.twitch.tv/nufns" target="_blank">TWITCH</a>          <!-- ← change username if needed -->
        <a href="https://kick.com/nufns" target="_blank">KICK</a>                  <!-- ← change username if needed -->
        <a href="https://steamcommunity.com/id/nufns" target="_blank">STEAM</a>   <!-- ← replace with your actual Steam link -->
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createParticle() {
    const centerX = canvas.width * 0.5;
    const centerY = canvas.height * 0.5;
    const spread = 65;

    particles.push({
        x: centerX + (Math.random() - 0.5) * spread * 2,
        y: centerY + (Math.random() - 0.5) * spread * 1.6,
        size: Math.random() * 2.6 + 1.1,
        speedX: (Math.random() - 0.5) * 0.9,
        speedY: (Math.random() - 0.5) * 0.9,
        life: 95 + Math.random() * 45
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (particles.length < 38) {
        createParticle();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        const alpha = Math.max(p.life / 110, 0.16);

        ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
