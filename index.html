<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    position: relative;
    text-align: center;
    background: #111;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(255,255,255,0.05);
    width: 300px;
}

/* Name */
.glow-name {
    position: relative;
    z-index: 2;
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
    margin-bottom: 10px;
}

/* Particle canvas */
#particles {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1;
}

/* Bio */
p {
    color: #aaa;
    font-size: 14px;
}

/* Links */
.links a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    background: #1a1a1a;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: #333;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1 class="glow-name">@nuf</h1>
    <canvas id="particles"></canvas>

    <p>EVERYTHING NUF</p>

    <div class="links">
        <a href="#">Discord</a>
        <a href="https://www.youtube.com/@nufns">YouTube</a>
        <a href="#">GitHub</a>
    </div>
</div>

<!-- ✅ JS goes OUTSIDE style -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = 300;
canvas.height = 120;

let particles = [];

function createParticle() {
    particles.push({
        x: canvas.width / 2,
        y: canvas.height / 2,
        size: Math.random() * 3 + 1,
        speedX: (Math.random() - 0.5) * 1.5,
        speedY: (Math.random() - 0.5) * 1.5,
        life: 100
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (particles.length < 40) createParticle();

    particles.forEach((p, i) => {
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.fillStyle = "rgba(255, 0, 0, 0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
