<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUF</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    text-align: center;
    background: #111;
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    width: 320px;
}

/* Name wrapper */
.name-wrapper {
    position: relative;
    display: inline-block;
}

/* Name */
.glow-name {
    position: relative;
    z-index: 2;
    font-size: 28px;
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff0000, 0 0 25px #ff0000;
    margin: 0;
}

/* Canvas for particles */
#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

/* Bio */
p {
    color: #aaa;
    font-size: 14px;
    margin: 20px 0 25px;
}

/* Social Links */
.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.links a {
    display: block;
    padding: 14px 20px;
    border-radius: 10px;
    background: #1a1a1a;
    text-decoration: none;
    color: white;
    font-size: 15px;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.06);
}

.links a:hover {
    background: #252525;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255, 40, 40, 0.15);
    border-color: rgba(255, 60, 60, 0.2);
}
</style>
</head>

<body>

<div class="container">
    
    <div class="name-wrapper">
        <h1 class="glow-name">@nuf</h1>
        <canvas id="particles"></canvas>
    </div>

    <p>EVERYTHING NUF</p>

    <div class="links">
        <a href="https://x.com/nufings">TWITTER</a>
        <a href="https://www.youtube.com/@nufns">YOUTUBE</a>
        <a href="#">GitHub</a>
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createParticle() {
    const padding = 6;
    particles.push({
        x: Math.random() * (canvas.width - padding * 2) + padding,
        y: Math.random() * (canvas.height - padding * 2) + padding,
        size: Math.random() * 2.5 + 1.2,     // Bigger and more visible
        speedX: (Math.random() - 0.5) * 1.8,
        speedY: (Math.random() - 0.5) * 1.8,
        life: 70 + Math.random() * 40        // Longer life
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // More particles for better visibility
    if (particles.length < 45) {
        createParticle();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        const alpha = Math.max(p.life / 80, 0.15);   // Higher minimum opacity

        ctx.fillStyle = `rgba(255, 60, 60, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
